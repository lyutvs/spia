name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: Build, Test, Typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v6

      - name: Setup JDK 21 (Temurin)
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup Node 20
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: app/frontend/package-lock.json

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Build (processor tests + app + KSP + tsc --strict)
        run: ./gradlew build --stacktrace --no-daemon

      - name: Verify openapi.json was generated
        run: test -f app/build/generated/spia/openapi.json

      - name: Verify configuration cache compatibility
        run: ./gradlew :app:kspKotlin --configuration-cache --no-daemon && ./gradlew :app:kspKotlin --configuration-cache --no-daemon

      - name: Upload coverage to Codecov
        if: always()
        continue-on-error: true
        uses: codecov/codecov-action@v6
        with:
          files: processor/build/reports/jacoco/test/jacocoTestReport.xml
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload test reports on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: test-reports
          path: |
            processor/build/reports/tests/test/**
            processor/build/reports/jacoco/test/html/**
            app/frontend/.typecheck-ok
          retention-days: 7
          if-no-files-found: ignore
